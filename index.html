<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule Dashboard</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/ical.js@1.5.0/build/ical.min.js"></script>
    <style>
        :root {
            --grey-100: #F5F5F5;
            --grey-300: #E0E0E0;
            --grey-600: #757575;
            --grey-800: #424242;
            --blue-accent: #2979FF;
            --blue-50: #E3F2FD;
            --blue-100: #BBDEFB;
            --green-800: #2E7D32;
            --red-accent: #FF5252;
            --shadow: 0 2px 4px rgba(0,0,0,0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #F9FAFB;
            color: #212121;
            padding: 20px 10px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }

        #app {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Unified Dashboard Card */
        .dashboard-card {
            background: #ffffff;
            border-radius: 12px;
            border: 1px solid var(--grey-300);
            box-shadow: var(--shadow);
            padding: 16px;
        }

        /* Header Section */
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .header-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--grey-800);
        }

        .header-actions {
            display: flex;
            gap: 6px;
        }

        .icon-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border: none;
            background: var(--grey-100);
            border-radius: 50%;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .icon-btn:hover {
            background-color: var(--grey-300);
        }

        .icon-btn .material-icons {
            font-size: 18px;
        }

        .icon-btn.refresh-btn .material-icons { color: var(--blue-accent); }
        .icon-btn.exit-btn .material-icons { color: var(--red-accent); }

        /* Integrated Date Picker Row */
        .controls-row {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 8px;
        }

        .inline-date-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--grey-600);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .inline-date-input {
            width: 100%;
            padding: 12px;
            font-size: 14px;
            font-family: inherit;
            border: 1px solid var(--grey-300);
            border-radius: 8px;
            background: #ffffff;
            outline: none;
            transition: border-color 0.2s;
        }

        .inline-date-input:focus {
            border-color: var(--blue-accent);
        }

        .status-label {
            font-size: 12px;
            font-style: italic;
            color: var(--grey-600);
            text-align: right;
        }

        .divider {
            height: 1px;
            background-color: var(--grey-300);
            margin: 8px 0;
            border: none;
        }

        /* Shifts Output Display */
        .date-header {
            font-size: 15px;
            font-weight: 700;
            color: var(--blue-accent);
            margin: 8px 0 12px 0;
        }

        .details-column {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .shift-card {
            padding: 14px;
            background-color: var(--blue-50);
            border-radius: 8px;
            border: 1px solid var(--blue-100);
            transition: transform 0.15s;
        }

        .shift-card:hover {
            transform: translateY(-1px);
        }

        .shift-card .shift-name {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 6px;
            color: #1565C0;
        }

        .shift-card .shift-time {
            font-size: 13px;
            font-weight: 600;
            color: var(--green-800);
            margin-bottom: 4px;
        }

        .shift-card .shift-location {
            font-size: 12px;
            color: var(--grey-800);
        }

        .no-shifts {
            padding: 20px;
            font-size: 13px;
            font-style: italic;
            color: var(--grey-600);
            text-align: center;
            background: var(--grey-100);
            border-radius: 8px;
            border: 1px dashed var(--grey-300);
        }

        /* Inline Integrated Error Notice instead of Modals */
        .error-banner {
            background-color: #FFEBEE;
            border: 1px solid #FFCDD2;
            color: #C62828;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 12px;
            display: none;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="dashboard-card">
            <div class="header-row">
                <span class="header-title">Schedule Dashboard</span>
                <div class="header-actions">
                    <button class="icon-btn refresh-btn" id="refresh-btn" title="Refresh">
                        <span class="material-icons">refresh</span>
                    </button>
                    <button class="icon-btn exit-btn" id="exit-btn" title="Exit">
                        <span class="material-icons">close</span>
                    </button>
                </div>
            </div>

            <div class="error-banner" id="error-banner"></div>

            <div class="controls-row">
                <label class="inline-date-label" for="date-input">Select Inspection Target</label>
                <input type="date" id="date-input" class="inline-date-input" min="2025-01-01" max="2030-12-31">
                <div class="status-label" id="status-label">Ready</div>
            </div>

            <hr class="divider">

            <div class="date-header" id="date-header">Loading Calendar View...</div>
            <div class="details-column" id="details-column"></div>
        </div>
    </div>

    <script>
        // ---- 1. Configuration & Data Loading ----
        let CONFIG_ICS_URL = null;
        let CONFIG_TIMEZONE = 'America/Edmonton';

        function getNativeIcsPath() {
            if (window.cordova) {
                return cordova.file.dataDirectory + 'myschedule.ics';
            } else if (window.Capacitor) {
                return 'myschedule.ics'; 
            }
            return './assets/data/myschedule.ics';
        }

        async function loadConfiguration() {
            try {
                CONFIG_ICS_URL = getNativeIcsPath();
                if (typeof Intl !== 'undefined' && Intl.DateTimeFormat) {
                    CONFIG_TIMEZONE = Intl.DateTimeFormat().resolvedOptions().timeZone;
                }
            } catch (e) {
                console.log('Error initializing environment paths: ' + e.message);
            }
        }

        // ---- ICS Calendar Parser Wrapper ----
        class Calendar {
            constructor(icsText) {
                this.events = [];
                this._parse(icsText);
            }

            _parse(icsText) {
                const jcalData = ICAL.parse(icsText);
                const component = new ICAL.Component(jcalData);
                const vevents = component.getAllSubcomponents('vevent');

                for (const vevent of vevents) {
                    const icalEvent = new ICAL.Event(vevent);
                    this.events.push({
                        begin: { datetime: icalEvent.startDate.toJSDate() },
                        end: { datetime: icalEvent.endDate.toJSDate() },
                        name: icalEvent.summary || '',
                        location: icalEvent.location || ''
                    });
                }
            }
        }

        // ---- 2. Application UI Dashboard Engine ----
        class CalendarApp {
            constructor(urlAddress, timezone) {
                this.icsUrl = urlAddress;
                this.eventsByDate = {};
                this.localTz = timezone || 'America/Edmonton';
                this.loadingLock = false;

                document.title = 'Schedule Dashboard';
                this.bindWidgets();
            }

            bindWidgets() {
                this.datePicker = document.getElementById('date-input');
                this.datePicker.addEventListener('change', (e) => this.onDateSelected(e));

                this.statusLabel = document.getElementById('status-label');
                this.errorBanner = document.getElementById('error-banner');

                this.refreshBtn = document.getElementById('refresh-btn');
                this.refreshBtn.addEventListener('click', () => this.triggerRefresh());

                this.exitBtn = document.getElementById('exit-btn');
                this.exitBtn.addEventListener('click', () => this.exitApplication());

                this.dateHeader = document.getElementById('date-header');
                this.detailsColumn = document.getElementById('details-column');

                // Seed picker baseline defaults to today's date in local landscape target format
                const todayStr = this._formatDateInTimezone(new Date(), this.localTz);
                this.datePicker.value = todayStr;
            }

            exitApplication() {
                if (typeof window.close === 'function') {
                    window.close();
                }
            }

            initializeLoad() {
                if (this.icsUrl) {
                    this.statusLabel.textContent = 'Connecting...';
                    this.fetchCalendarData();
                } else {
                    this.showError('Configuration Mapping Error', 'No calendar source path detected.');
                }
            }

            triggerRefresh() {
                if (!this.loadingLock && this.icsUrl) {
                    this.statusLabel.textContent = 'Refreshing...';
                    this.hideError();
                    this.fetchCalendarData();
                }
            }

            async fetchCalendarData() {
                if (this.loadingLock) return;

                try {
                    this.loadingLock = true;
                    this.statusLabel.textContent = 'Authenticating...';

                    const isAuthenticated = await this._authenticateUserMobile();
                    if (!isAuthenticated) {
                        throw new Error('Identity verification checks was rejected.');
                    }

                    this.statusLabel.textContent = 'Reading storage...';
                    let icsText = '';

                    if (window.cordova) {
                        icsText = await this._readLocalFileCordova(this.icsUrl);
                    } else if (window.Capacitor) {
                        icsText = await this._readLocalFileCapacitor(this.icsUrl);
                    } else {
                        const response = await fetch(this.icsUrl);
                        if (!response.ok) throw new Error('HTTP status failure code: ' + response.status);
                        icsText = await response.text();
                    }

                    icsText = icsText.trim();
                    if (!icsText.startsWith('BEGIN:VCALENDAR')) {
                        throw new Error('Target text resource structure is not a valid iCalendar entry feed.');
                    }

                    const calendar = new Calendar(icsText);
                    const temporaryEvents = {};

                    for (const event of calendar.events) {
                        const localBegin = event.begin.datetime; 
                        const dateStr = this._formatDateInTimezone(localBegin, this.localTz);
                        if (!temporaryEvents[dateStr]) {
                            temporaryEvents[dateStr] = [];
                        }
                        temporaryEvents[dateStr].push(event);
                    }

                    this.eventsByDate = temporaryEvents;
                    this.statusLabel.textContent = 'Loaded ' + calendar.events.length + ' records.';
                    this.loadingLock = false;

                    // Immediately re-evaluate visual status output based on active input criteria
                    this.onDateSelected();

                } catch (err) {
                    this.loadingLock = false;
                    this.statusLabel.textContent = 'Access Denied.';
                    this.showError('Security & Access Error', String(err).replace('Error: ', ''));
                    
                    // Fallback visually if data loading encounters functional failure states
                    this.detailsColumn.innerHTML = '<div class="no-shifts">Unable to parse calendar metrics.</div>';
                }
            }

            onDateSelected() {
                let selectedValue = this.datePicker.value;
                if (!selectedValue) return;

                let parsedDate = new Date();
                try {
                    const parts = selectedValue.split('-');
                    if (parts.length === 3) {
                        parsedDate = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
                    } else {
                        parsedDate = new Date(selectedValue.replace('Z', '+00:00'));
                    }
                } catch (e) {
                    return;
                }

                this.displayShiftsForDate(parsedDate);
            }

            displayShiftsForDate(targetDate) {
                const dateKey = this._formatDateInTimezone(targetDate, this.localTz);
                this.dateHeader.textContent = this._formatDateHeader(targetDate, this.localTz);
                this.detailsColumn.innerHTML = '';

                if (dateKey in this.eventsByDate) {
                    const dayEvents = [...this.eventsByDate[dateKey]].sort((a, b) => a.begin.datetime - b.begin.datetime);

                    for (const ev of dayEvents) {
                        const startTime = this._formatTimeInTimezone(ev.begin.datetime, this.localTz);
                        const endTime = this._formatTimeInTimezone(ev.end.datetime, this.localTz);
                        const location = ev.location ? ev.location : 'Not Specified';

                        const shiftCard = document.createElement('div');
                        shiftCard.className = 'shift-card';
                        shiftCard.innerHTML =
                            '<div class="shift-name">&#x1F4BC; ' + this._escapeHtml(ev.name) + '</div>' +
                            '<div class="shift-time">&#x23F0; ' + this._escapeHtml(startTime) + ' - ' + this._escapeHtml(endTime) + '</div>' +
                            '<div class="shift-location">&#x1F4CD; Location: ' + this._escapeHtml(location) + '</div>';

                        this.detailsColumn.appendChild(shiftCard);
                    }
                } else {
                    const noShiftsDiv = document.createElement('div');
                    noShiftsDiv.className = 'no-shifts';
                    noShiftsDiv.textContent = 'No shifts scheduled for this day.';
                    this.detailsColumn.appendChild(noShiftsDiv);
                }
            }

            showError(title, message) {
                this.errorBanner.textContent = `⚠️ ${title}: ${message}`;
                this.errorBanner.style.display = 'block';
            }

            hideError() {
                this.errorBanner.style.display = 'none';
                this.errorBanner.textContent = '';
            }

            _formatDateInTimezone(date, timezone) {
                const formatter = new Intl.DateTimeFormat('en-CA', {
                    timeZone: timezone, year: 'numeric', month: '2-digit', day: '2-digit'
                });
                return formatter.format(date);
            }

            _formatDateHeader(date, timezone) {
                const formatter = new Intl.DateTimeFormat('en-US', {
                    timeZone: timezone, weekday: 'long', month: 'short', day: 'numeric', year: 'numeric'
                });
                return formatter.format(date);
            }

            _formatTimeInTimezone(date, timezone) {
                const formatter = new Intl.DateTimeFormat('en-US', {
                    timeZone: timezone, hour: '2-digit', minute: '2-digit', hour12: true
                });
                return formatter.format(date);
            }

            _escapeHtml(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            // ---- Native Platform Platform Drivers ----
            _authenticateUserMobile() {
                return new Promise((resolve) => {
                    if (window.Capacitor && window.Capacitor.Plugins.BiometricAuth) {
                        window.Capacitor.Plugins.BiometricAuth.verifyBiometric({
                            reason: "Verify your identity to access your schedule files",
                            title: "Identity Verification Required"
                        }).then(() => resolve(true)).catch(() => resolve(false));
                    } else if (window.Fingerprint) {
                        window.Fingerprint.show({
                            title: 'Identity Verification Required',
                            description: 'Verify your identity to access your schedule files',
                            disableBackup: false
                        }, () => resolve(true), () => resolve(false));
                    } else {
                        console.warn("Biometrics missing context. Simulating local continuous loop.");
                        resolve(true); 
                    }
                });
            }

            _readLocalFileCordova(filePath) {
                return new Promise((resolve, reject) => {
                    window.resolveLocalFileSystemURL(filePath, (fileEntry) => {
                        fileEntry.file((file) => {
                            const reader = new FileReader();
                            reader.onloadend = function() { resolve(this.result); };
                            reader.onerror = reject;
                            reader.readAsText(file);
                        }, reject);
                    }, reject);
                });
            }

            async _readLocalFileCapacitor(fileName) {
                const { Filesystem, Directory } = window.Capacitor.Plugins;
                const contents = await Filesystem.readFile({
                    path: fileName,
                    directory: Directory.Data,
                    encoding: 'utf8'
                });
                return contents.data;
            }
        }

        // ---- 3. Launcher Loop ----
        async function main() {
            await loadConfiguration();
            const app = new CalendarApp(CONFIG_ICS_URL, CONFIG_TIMEZONE);
            app.initializeLoad();
        }

        document.addEventListener('DOMContentLoaded', main);
    </script>
</body>
</html>
