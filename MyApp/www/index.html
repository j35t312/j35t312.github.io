<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule Viewer</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/ical.js@1.5.0/build/ical.min.js"></script>
    <style>
        :root {
            --grey-600: #757575;
            --blue-accent: #448AFF;
            --red-accent: #FF5252;
            --green-800: #2E7D32;
            --grey-800: #424242;
            --blue-50: #E3F2FD;
            --blue-100: #BBDEFB;
            --blue-600: #1E88E5;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            padding: 20px 10px;
            background-color: #ffffff;
            color: #212121;
            min-height: 100vh;
        }

        #app {
            max-width: 600px;
            margin: 0 auto;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .header-title {
            font-size: 16px;
            font-weight: 600;
        }

        .header-actions {
            display: flex;
            gap: 4px;
        }

        .icon-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border: none;
            background: transparent;
            border-radius: 50%;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .icon-btn:hover { background-color: rgba(0, 0, 0, 0.08); }
        .icon-btn.refresh-btn .material-icons { color: var(--blue-accent); }
        .icon-btn.exit-btn .material-icons { color: var(--red-accent); }

        .status-label {
            font-size: 12px;
            font-style: italic;
            color: var(--grey-600);
            margin-bottom: 8px;
        }

        .divider {
            height: 1px;
            background-color: #e0e0e0;
            margin: 12px 0;
            border: none;
        }

        /* --- Month Navigation Controls --- */
        .calendar-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .month-label {
            font-size: 16px;
            font-weight: bold;
            text-transform: capitalize;
        }

        /* --- Calendar Grid Layout --- */
        .calendar-container {
            width: 100%;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            overflow: hidden;
            background: #fafafa;
        }

        .weekdays-header {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            background-color: #eee;
            text-align: center;
            font-weight: 600;
            font-size: 12px;
            padding: 8px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
        }

        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 6px 2px;
            background: #ffffff;
            border-right: 1px solid #f0f0f0;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            font-size: 13px;
            position: relative;
        }

        .calendar-day:nth-child(7n) { border-right: none; }
        .calendar-day:hover { background-color: #f5f5f5; }
        
        .calendar-day.empty {
            background: #fafafa;
            cursor: default;
        }

        .calendar-day.selected {
            background-color: var(--blue-50) !important;
            font-weight: bold;
            border: 2px solid var(--blue-accent);
        }

        .calendar-day.today {
            color: var(--blue-600);
            font-weight: bold;
        }

        /* Shift Dot Indicator */
        .shift-indicator {
            width: 6px;
            height: 6px;
            background-color: var(--green-800);
            border-radius: 50%;
            margin-top: 2px;
        }

        /* --- Shift Details List Below --- */
        .day-details-title {
            font-size: 14px;
            font-weight: bold;
            margin: 16px 0 8px 0;
            color: var(--grey-800);
        }

        .details-column {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .shift-card {
            padding: 12px;
            background-color: var(--blue-50);
            border-radius: 8px;
            border: 1px solid var(--blue-100);
        }

        .shift-card .shift-name { font-size: 14px; font-weight: bold; margin-bottom: 4px; }
        .shift-card .shift-time { font-size: 13px; color: var(--green-800); margin-bottom: 4px; }
        .shift-card .shift-location { font-size: 12px; color: var(--grey-800); }

        .no-shifts {
            padding: 10px;
            font-size: 13px;
            font-style: italic;
            color: #757575;
        }

        /* --- Custom Dialog Layouts --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.5); display: flex;
            align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-dialog {
            background: #ffffff; border-radius: 8px; padding: 24px;
            min-width: 280px; max-width: 400px; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        }
        .modal-dialog .modal-title { font-size: 14px; font-weight: bold; margin-bottom: 12px; }
        .modal-dialog .modal-content { font-size: 12px; margin-bottom: 20px; color: #424242; }
        .modal-dialog .modal-actions { display: flex; justify-content: flex-end; }
        .modal-dialog .modal-ok-btn {
            padding: 8px 16px; border: none; background: transparent;
            color: #1976D2; font-size: 14px; font-weight: 500; cursor: pointer;
            text-transform: uppercase; border-radius: 4px;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="header-row" id="header-row">
            <span class="header-title">Schedule Navigation</span>
            <div class="header-actions">
                <button class="icon-btn" id="load-file-btn" title="Open Local File Anywhere">
                    <span class="material-icons">folder_open</span>
                </button>
                <button class="icon-btn refresh-btn" id="refresh-btn" title="Refresh Schedule">
                    <span class="material-icons">refresh</span>
                </button>
                <button class="icon-btn exit-btn" id="exit-btn" title="Exit Application">
                    <span class="material-icons">close</span>
                </button>
            </div>
        </div>

        <div class="status-label" id="status-label">Ready</div>
        <hr class="divider">

        <div class="calendar-controls">
            <button class="icon-btn" id="prev-month-btn" title="Previous Month">
                <span class="material-icons">chevron_left</span>
            </button>
            <span class="month-label" id="month-label">Month Year</span>
            <button class="icon-btn" id="next-month-btn" title="Next Month">
                <span class="material-icons">chevron_right</span>
            </button>
        </div>

        <div class="calendar-container">
            <div class="weekdays-header">
                <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
            </div>
            <div class="calendar-grid" id="calendar-grid"></div>
        </div>

        <div class="day-details-title" id="day-details-title">Selected Date Agenda</div>
        <div class="details-column" id="details-column">Select a day to view shifts</div>
    </div>

    <script src="cordova.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
